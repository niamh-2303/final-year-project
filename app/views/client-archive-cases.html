<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Archived Cases - DFIR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/dashboard-style.css">
</head>
<body class="client-archive-cases">
    <div class="container-fluid p-0">
        <div class="row g-0">
            <nav class="col-md-2 sidebar">
                <div class="sidebar-logo">
                    <div class="logo-wrapper">
                        <a href="client-dashboard.html">
                            <img src="images/logo.webp" alt="Logo" class="sidebar-logo-img">
                        </a>
                    </div>
                    <div class="logo-text">
                        <h5>DFIR</h5>
                        <small>Case Management</small>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h6 class="sidebar-heading">MAIN</h6>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="client-dashboard.html">
                                <i class="bi bi-speedometer2"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="client-reports.html">
                                <i class="bi bi-file-earmark-text"></i>
                                <span>Reports</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <h6 class="sidebar-heading">SHORTCUTS</h6>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="client-archive-cases.html">
                                <i class="bi bi-archive"></i>
                                <span>Archive</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="settings.html">
                                <i class="bi bi-gear"></i>
                                <span>Settings</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-profile">
                    <div class="profile-details">
                        <strong id="sidebarUserName">Loading...</strong>
                        <small id="sidebarUserRole">Client</small>
                    </div>
                </div>
            </nav>

            <main class="col-md-10 main-content">
                <div class="content-header">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <div class="breadcrumb-nav">
                                <a href="client-dashboard.html" class="breadcrumb-link">
                                    <i class="bi bi-house-door"></i>
                                    <span>Home</span>
                                </a>
                                <i class="bi bi-chevron-right"></i>
                                <span>Archived Cases</span>
                            </div>
                            <h1 class="page-title">Archived Cases</h1>
                        </div>
                        <div class="header-actions">
                            <div class="dropdown">
                                <button class="btn btn-profile-header" id="profileButton" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="User Profile">
                                    <i class="bi bi-person-circle"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end profile-dropdown-menu">
                                    <li class="dropdown-header">
                                        <div class="profile-info-dropdown">
                                            <strong id="userName">Loading...</strong>
                                            <small id="userEmail">user@example.com</small>
                                        </div>
                                    </li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <a class="dropdown-item" href="#" onclick="logout()">
                                            <i class="bi bi-box-arrow-right"></i>
                                            Logout
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="archivedCasesContainer"></div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/client-archived-cases.js"></script>
</body>
</html>
